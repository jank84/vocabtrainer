<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h1>PWA Icon Generator for Anki Scribe</h1>
<p>Click each button to download the icon, then place it in the <code>icons/</code> folder.</p>
<div id="previews"></div>
<script>
function drawIcon(canvas, size, maskable) {
  const ctx = canvas.getContext('2d');
  canvas.width = size;
  canvas.height = size;

  const padding = maskable ? size * 0.1 : 0;
  const s = size - padding * 2;
  const ox = padding;
  const oy = padding;

  // Background
  if (maskable) {
    ctx.fillStyle = '#6c7ff8';
    ctx.fillRect(0, 0, size, size);
  } else {
    const r = size * 0.15;
    ctx.beginPath();
    ctx.moveTo(ox + r, oy);
    ctx.lineTo(ox + s - r, oy);
    ctx.quadraticCurveTo(ox + s, oy, ox + s, oy + r);
    ctx.lineTo(ox + s, oy + s - r);
    ctx.quadraticCurveTo(ox + s, oy + s, ox + s - r, oy + s);
    ctx.lineTo(ox + r, oy + s);
    ctx.quadraticCurveTo(ox, oy + s, ox, oy + s - r);
    ctx.lineTo(ox, oy + r);
    ctx.quadraticCurveTo(ox, oy, ox + r, oy);
    ctx.closePath();
    ctx.fillStyle = '#6c7ff8';
    ctx.fill();
  }

  // Pen icon (stylized writing pen)
  const cx = ox + s / 2;
  const cy = oy + s / 2;
  const u = s / 10; // unit

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.6);

  // Pen body
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(-u * 0.8, -u * 3.5);
  ctx.lineTo(u * 0.8, -u * 3.5);
  ctx.lineTo(u * 0.8, u * 1.5);
  ctx.lineTo(0, u * 3);
  ctx.lineTo(-u * 0.8, u * 1.5);
  ctx.closePath();
  ctx.fill();

  // Pen tip
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(-u * 0.5, u * 1.5);
  ctx.lineTo(u * 0.5, u * 1.5);
  ctx.lineTo(0, u * 3);
  ctx.closePath();
  ctx.fill();

  // Pen top
  ctx.fillStyle = '#ddd';
  ctx.fillRect(-u * 0.8, -u * 3.5, u * 1.6, u * 0.6);

  ctx.restore();

  // "A" letter bottom-right
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${s * 0.28}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('A', ox + s * 0.72, oy + s * 0.72);
}

const configs = [
  { name: 'icon-192.png', size: 192, maskable: false },
  { name: 'icon-512.png', size: 512, maskable: false },
  { name: 'icon-maskable-192.png', size: 192, maskable: true },
  { name: 'icon-maskable-512.png', size: 512, maskable: true },
];

const container = document.getElementById('previews');

configs.forEach(cfg => {
  const div = document.createElement('div');
  div.style.marginBottom = '20px';

  const canvas = document.createElement('canvas');
  drawIcon(canvas, cfg.size, cfg.maskable);

  const preview = document.createElement('canvas');
  preview.width = 128;
  preview.height = 128;
  preview.style.border = '1px solid #ccc';
  preview.style.background = '#eee';
  preview.getContext('2d').drawImage(canvas, 0, 0, 128, 128);

  const btn = document.createElement('button');
  btn.textContent = `Download ${cfg.name} (${cfg.size}x${cfg.size})`;
  btn.style.marginLeft = '10px';
  btn.onclick = () => {
    const link = document.createElement('a');
    link.download = cfg.name;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  div.appendChild(preview);
  div.appendChild(btn);
  container.appendChild(div);
});
</script>
</body>
</html>
